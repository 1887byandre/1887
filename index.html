<div id="root"></div>
<script type="text/babel">
const {useState, useEffect} = React;

const STAFF = {
  owner:     {name:"Owner",           pin:"0000", color:"#C4A96B", bc:"#C4A96B", icon:"👑"},
  gm:        {name:"General Manager", pin:"1111", color:"#8FAF8A", bc:"#8FAF8A", icon:"◈"},
  manager:   {name:"Manager",         pin:"2222", color:"#A8C4E0", bc:"#A8C4E0", icon:"◆"},
  chef:      {name:"Head Chef",       pin:"3333", color:"#C4876A", bc:"#C4876A", icon:"◍"},
  sommelier: {name:"Sommelier",       pin:"4444", color:"#C4A0C4", bc:"#C4A0C4", icon:"◎"},
  bar:       {name:"Bar Team",        pin:"5555", color:"#7EC8C8", bc:"#7EC8C8", icon:"◐"},
  service:   {name:"Service",         pin:"6666", color:"#C8C87E", bc:"#C8C87E", icon:"◑"}
};

const ROLES = [
  {id:"all", label:"All Staff"},
  ...Object.entries(STAFF).map(([id,s])=>({id,label:s.name}))
];

const STATUS = {
  pending:       {label:"To Do",       color:"#8A9A86"},
  "in-progress": {label:"In Progress", color:"#C4A96B"},
  completed:     {label:"Done ✓",      color:"#8FAF8A"}
};

function todayStr(){return new Date().toISOString().split('T')[0]}
function tsStr(){
  const n=new Date();
  return n.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+
         n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
function dateOnly(ts){
  // ts is like "23 Mar 2026 14:30" — extract date key YYYY-MM-DD
  try{return new Date(ts).toISOString().split('T')[0]}catch{return ''}
}
function fmtDate(d){
  if(!d)return'';
  const [y,m,day]=d.split('-');
  return `${day}/${m}/${y}`;
}

// URGENT = past deadline OR forceUrgent; DEADLINE = exactly today
function taskStatus(t){
  if(t.status==='completed')return'normal';
  if(t.forceUrgent)return'urgent';
  const td=todayStr();
  if(!t.deadline)return'normal';
  if(t.deadline<td)return'urgent';
  if(t.deadline===td)return'deadline';
  return'normal';
}

function userKey(user){return Object.keys(STAFF).find(k=>STAFF[k].name===user.name)||''}

function fbRef(p){return window._fbRef(window._fbDb,p)}
function fbPush(p,v){return window._fbPush(fbRef(p),v)}
function fbUpdate(p,v){return window._fbUpdate(fbRef(p),v)}
function fbRemove(p){return window._fbRemove(fbRef(p))}
function fbListen(p,cb){return window._fbOnValue(fbRef(p),s=>cb(s.val()))}

// ── PIN Login ─────────────────────────────────────────────────
function PinLogin({staff,onSuccess,onBack}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState(false);
  function press(d){
    if(pin.length>=4)return;
    const next=pin+d;setPin(next);setErr(false);
    if(next.length===4){
      if(next===staff.pin)onSuccess();
      else setTimeout(()=>{setPin('');setErr(true)},300);
    }
  }
  return(
    <div className="lgn">
      <button className="btn-secondary" onClick={onBack} style={{alignSelf:'flex-start'}}>← Back</button>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'28px',marginBottom:'8px'}}>{staff.icon}</div>
        <div className="pin-title" style={{color:staff.color}}>{staff.name}</div>
        <div style={{fontSize:'14px',color:'#6A7A66',marginTop:'4px'}}>Enter PIN</div>
      </div>
      <div className="pin-dots">
        {[0,1,2,3].map(i=><div key={i} className={`pin-dot${pin.length>i?' filled':''}`}/>)}
      </div>
      {err&&<div className="pin-err">Incorrect PIN. Try again.</div>}
      <div className="pin-pad">
        {[1,2,3,4,5,6,7,8,9].map(n=>(
          <button key={n} className="pin-key" onClick={()=>press(String(n))}>{n}</button>
        ))}
        <div/>
        <button className="pin-key" onClick={()=>press('0')}>0</button>
        <button className="pin-key del" onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
      </div>
    </div>
  );
}

// ── Add Task Form ─────────────────────────────────────────────
function AddTaskForm({user,onCancel}){
  const [title,setTitle]=useState('');
  const [notes,setNotes]=useState('');
  const [assign,setAssign]=useState('all');
  const [deadline,setDeadline]=useState('');
  const [forceUrgent,setForceUrgent]=useState(false);
  const [err,setErr]=useState(false);

  function submit(){
    if(!title.trim()||!deadline){setErr(true);return;}
    fbPush('tasks',{
      title:title.trim(),notes:notes.trim(),assignee:assign,
      status:'pending',createdBy:user.name,createdAt:tsStr(),
      createdTs:Date.now(),deadline,forceUrgent
    });
    onCancel();
  }

  return(
    <div className="add-form">
      <div style={{fontSize:'15px',fontWeight:'700',color:'#E8DFC8'}}>New Task</div>
      <div>
        <div className="form-label">Task title *</div>
        <input placeholder="e.g. Polish glassware" value={title} onChange={e=>setTitle(e.target.value)}/>
      </div>
      <div>
        <div className="form-label">Notes (optional)</div>
        <textarea placeholder="Additional details..." value={notes} onChange={e=>setNotes(e.target.value)}/>
      </div>
      <div>
        <div className="form-label">Deadline *</div>
        <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
          <input type="date" value={deadline} min={todayStr()} onChange={e=>setDeadline(e.target.value)}
            style={{flex:1,background:'#161A13',border:'1px solid #2A3A28',color:'#E8DFC8',borderRadius:'8px',padding:'12px',fontSize:'15px',fontFamily:'Inter,sans-serif',outline:'none',colorScheme:'dark'}}/>
          <button onClick={()=>setForceUrgent(u=>!u)} className={forceUrgent?'utog-on':'utog-off'}>
            ⚠ URGENT
          </button>
        </div>
      </div>
      <div>
        <div className="form-label">Assign to</div>
        <select value={assign} onChange={e=>setAssign(e.target.value)}>
          {ROLES.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
        </select>
      </div>
      {err&&<div style={{color:'#E05555',fontSize:'13px'}}>Please fill in title and deadline.</div>}
      <div style={{display:'flex',gap:'8px'}}>
        <button className="btn-secondary" style={{flex:1}} onClick={onCancel}>Cancel</button>
        <button className="btn-primary" style={{flex:2}} onClick={submit}>Add Task</button>
      </div>
    </div>
  );
}

// ── Task Card ─────────────────────────────────────────────────
function TaskCard({fbKey,task,user}){
  const authorStaff=Object.values(STAFF).find(s=>s.name===task.createdBy);
  const authorColor=authorStaff?.color||'#8A9A86';
  const assignColor=task.assignee==='all'?'#8A9A86':(STAFF[task.assignee]?.color||'#8A9A86');
  const assignLabel=task.assignee==='all'?'All Staff':(STAFF[task.assignee]?.name||task.assignee);
  const isOwner=userKey(user)==='owner';
  const canDel=isOwner||(task.createdBy===user.name);
  const tStatus=taskStatus(task);

  function setStatus(s){fbUpdate(`tasks/${fbKey}`,{status:s})}
  function del(){fbRemove(`tasks/${fbKey}`)}

  let cardClass='task-card';
  let borderColor=STATUS[task.status].color;
  if(tStatus==='urgent'){cardClass='task-card urgent';borderColor=undefined;}
  else if(tStatus==='deadline'){cardClass='task-card deadline';borderColor=undefined;}

  return(
    <div className={cardClass} style={borderColor?{borderLeftColor:borderColor}:{}}>
      <div className="task-top">
        <div className="task-title">{task.title}</div>
        {canDel&&<button className="task-del" onClick={del}>×</button>}
      </div>
      {task.notes&&<div className="task-notes">{task.notes}</div>}
      <div className="task-meta">
        {tStatus==='urgent'&&<span className="urgent-badge">⚠ URGENT</span>}
        {tStatus==='deadline'&&<span className="deadline-badge-tag">⏰ DEADLINE</span>}
        {task.deadline&&<span className="date-badge">📅 {fmtDate(task.deadline)}</span>}
        <span className="badge" style={{background:'#161A13',color:assignColor,border:`1px solid ${assignColor}44`}}>→ {assignLabel}</span>
        <span className="badge" style={{background:'#161A13',color:authorColor,border:`1px solid ${authorColor}44`}}>by {task.createdBy}</span>
      </div>
      <div className="status-btns">
        {Object.entries(STATUS).map(([k,v])=>(
          <button key={k} className={`status-btn${task.status===k?' active':''}`}
            style={{color:task.status===k?v.color:'#6A7A66',borderColor:task.status===k?v.color:'#2A3A28'}}
            onClick={()=>setStatus(k)}>{v.label}</button>
        ))}
      </div>
    </div>
  );
}

// ── Tasks Tab ─────────────────────────────────────────────────
function TasksTab({user,tasks}){
  const [showForm,setShowForm]=useState(false);
  const uk=userKey(user);
  const isOwner=uk==='owner';

  function canSee(t){
    if(isOwner)return true;                          // Only Owner sees all
    if(t.assignee==='all')return true;               // All staff tasks visible to everyone
    if(t.createdBy===user.name)return true;          // I created it
    return t.assignee===uk;                          // Assigned directly to me
  }

  const groups={pending:[],["in-progress"]:[],completed:[]};
  Object.entries(tasks).forEach(([k,t])=>{
    if(canSee(t)&&groups[t.status])groups[t.status].push({fbKey:k,...t});
  });

  function sortTasks(arr){
    return arr.sort((a,b)=>{
      const ap=taskStatus(a)==='urgent'?0:taskStatus(a)==='deadline'?1:2;
      const bp=taskStatus(b)==='urgent'?0:taskStatus(b)==='deadline'?1:2;
      if(ap!==bp)return ap-bp;
      if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);
      return b.createdTs-a.createdTs;
    });
  }

  return(
    <div className="content">
      {showForm
        ?<AddTaskForm user={user} onCancel={()=>setShowForm(false)}/>
        :<button className="btn-primary" style={{marginBottom:'14px'}} onClick={()=>setShowForm(true)}>+ New Task</button>
      }
      {Object.entries(STATUS).map(([sk,sv])=>(
        <div key={sk}>
          <div className="section-label" style={{color:sv.color}}>{sv.label} ({groups[sk].length})</div>
          {groups[sk].length===0&&<div className="empty">No tasks</div>}
          {sortTasks(groups[sk]).map(t=><TaskCard key={t.fbKey} fbKey={t.fbKey} task={t} user={user}/>)}
        </div>
      ))}
    </div>
  );
}

// ── Notes Tab ─────────────────────────────────────────────────
function NotesTab({user,notes}){
  const [text,setText]=useState('');
  const [calDate,setCalDate]=useState(null); // selected archive date
  const [calMonth,setCalMonth]=useState(()=>{const n=new Date();return{y:n.getFullYear(),m:n.getMonth()}});

  function addNote(){
    if(!text.trim())return;
    const authorColor=Object.values(STAFF).find(s=>s.name===user.name)?.color||'#8A9A86';
    const dateKey=todayStr();
    fbPush('notes',{
      author:user.name,authorColor,body:text.trim(),
      ts:tsStr(),dateKey,createdTs:Date.now(),deleted:false
    });
    setText('');
  }

  function deleteNote(k,n){
    fbUpdate(`notes/${k}`,{deleted:true,deletedBy:user.name,body:n.body});
  }

  // Split notes: last 7 days vs archive
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const cutoffStr=cutoff.toISOString().split('T')[0];

  const recent=[];
  const archiveMap={};
  Object.entries(notes).forEach(([k,n])=>{
    const d=n.dateKey||dateOnly(n.ts||'');
    if(d>=cutoffStr){recent.push({k,...n});}
    else{
      if(!archiveMap[d])archiveMap[d]=[];
      archiveMap[d].push({k,...n});
    }
  });
  recent.sort((a,b)=>b.createdTs-a.createdTs);

  // Calendar helpers
  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDay=(y,m)=>new Date(y,m,1).getDay();
  const monthName=(y,m)=>new Date(y,m,1).toLocaleString('default',{month:'long',year:'numeric'});

  function prevMonth(){setCalMonth(c=>{const d=new Date(c.y,c.m-1);return{y:d.getFullYear(),m:d.getMonth()}})}
  function nextMonth(){setCalMonth(c=>{const d=new Date(c.y,c.m+1);return{y:d.getFullYear(),m:d.getMonth()}})}

  const days=daysInMonth(calMonth.y,calMonth.m);
  const startDay=firstDay(calMonth.y,calMonth.m);
  const dayLabels=['Su','Mo','Tu','We','Th','Fr','Sa'];

  function dateKey(y,m,d){
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  const selectedNotes=calDate?archiveMap[calDate]||[]:[];

  return(
    <div className="content">
      <div className="add-form">
        <div style={{fontSize:'15px',fontWeight:'700',color:'#E8DFC8'}}>Post a Shift Note</div>
        <textarea placeholder="Write a note for the team..." value={text} onChange={e=>setText(e.target.value)}
          style={{height:'80px',background:'#161A13',border:'1px solid #2A3A28',color:'#E8DFC8',borderRadius:'8px',padding:'12px',fontSize:'15px',fontFamily:'Inter,sans-serif',width:'100%',outline:'none',resize:'none'}}/>
        <button className="btn-primary" onClick={addNote}>Post Note</button>
      </div>

      {/* Recent 7 days */}
      {recent.length===0&&<div className="empty">No shift notes in the last 7 days</div>}
      {recent.map(n=>(
        <div key={n.k} className={`note-card${n.deleted?' deleted':''}`}>
          <div className="note-header">
            <div>
              <span className="note-author" style={{color:n.deleted?'#6A7A66':n.authorColor}}>
                {n.deleted?'—':n.author}
              </span>
              <div className="note-meta">{n.ts}</div>
            </div>
            {!n.deleted&&<button className="note-del" onClick={()=>deleteNote(n.k,n)}>×</button>}
          </div>
          {n.deleted
            ?<div style={{fontSize:'14px',color:'#4A5A46',fontStyle:'italic'}}>Note deleted by {n.deletedBy}</div>
            :<div className="note-body" style={{whiteSpace:'pre-wrap'}}>{n.body}</div>
          }
        </div>
      ))}

      {/* Archive calendar */}
      {Object.keys(archiveMap).length>0&&(
        <>
          <div className="archive-hdr">📅 Archive</div>
          <div className="cal-nav">
            <button onClick={prevMonth}>‹</button>
            <span>{monthName(calMonth.y,calMonth.m)}</span>
            <button onClick={nextMonth}>›</button>
          </div>
          <div className="cal-grid">
            {dayLabels.map(d=><div key={d} className="cal-day-label">{d}</div>)}
            {Array(startDay).fill(null).map((_,i)=><div key={'e'+i}/>)}
            {Array(days).fill(null).map((_,i)=>{
              const dk=dateKey(calMonth.y,calMonth.m,i+1);
              const has=!!archiveMap[dk];
              const sel=calDate===dk;
              return(
                <div key={i} className={`cal-day${has?' has-notes':''}`}
                  style={sel?{background:'#C4A96B',color:'#1A1E16',borderColor:'#C4A96B'}:{}}
                  onClick={()=>has&&setCalDate(sel?null:dk)}>
                  {i+1}
                </div>
              );
            })}
          </div>
          {calDate&&(
            <>
              <div className="archive-notes-hdr">Notes for {fmtDate(calDate)}</div>
              {selectedNotes.sort((a,b)=>b.createdTs-a.createdTs).map(n=>(
                <div key={n.k} className={`note-card${n.deleted?' deleted':''}`}>
                  <div className="note-header">
                    <div>
                      <span className="note-author" style={{color:n.deleted?'#6A7A66':n.authorColor}}>
                        {n.deleted?'—':n.author}
                      </span>
                      <div className="note-meta">{n.ts}</div>
                    </div>
                  </div>
                  {n.deleted
                    ?<div style={{fontSize:'14px',color:'#4A5A46',fontStyle:'italic'}}>Note deleted by {n.deletedBy}</div>
                    :<div className="note-body" style={{whiteSpace:'pre-wrap'}}>{n.body}</div>
                  }
                </div>
              ))}
            </>
          )}
        </>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App(){
  const [fbReady,setFbReady]=useState(!!window._fbReady);
  const [user,setUser]=useState(null);
  const [pinFor,setPinFor]=useState(null);
  const [tab,setTab]=useState('tasks');
  const [tasks,setTasks]=useState({});
  const [notes,setNotes]=useState({});

  useEffect(()=>{
    if(window._fbReady){setFbReady(true);return}
    window.addEventListener('fb-ready',()=>setFbReady(true),{once:true});
  },[]);

  useEffect(()=>{
    if(!fbReady)return;
    const ut=fbListen('tasks',d=>setTasks(d||{}));
    const un=fbListen('notes',d=>setNotes(d||{}));
    return()=>{ut();un()};
  },[fbReady]);

  if(!fbReady)return <div className="lgn"><div className="syncing">Connecting…</div></div>;

  if(!user&&!pinFor)return(
    <div className="lgn">
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'12px'}}>
        <img src="logo.png" alt="1887 by André" style={{width:'160px',height:'160px',objectFit:'contain'}}/>
        <div className="lgn-title">Mise en Place</div>
        <div className="lgn-sub">Design & Developed by ACG</div>
      </div>
      <div className="staff-grid">
        {Object.entries(STAFF).map(([id,s])=>(
          <button key={id} className="staff-btn" onClick={()=>setPinFor({id,s})}
            style={{borderColor:s.bc+'66',color:s.color}}>
            <span className="staff-icon">{s.icon}</span>
            <span className="staff-name">{s.name}</span>
          </button>
        ))}
      </div>
    </div>
  );

  if(pinFor&&!user)return(
    <PinLogin staff={pinFor.s}
      onSuccess={()=>{setUser(pinFor.s);setPinFor(null)}}
      onBack={()=>setPinFor(null)}/>
  );

  const visibleTasks=Object.values(tasks).filter(t=>{
    const uk=userKey(user);
    const isOwner=uk==='owner';
    if(isOwner)return true;
    if(t.assignee==='all')return true;
    if(t.createdBy===user.name)return true;
    return t.assignee===uk;
  });
  const urgentCount=visibleTasks.filter(t=>t.status!=='completed'&&taskStatus(t)==='urgent').length;
  const deadlineCount=visibleTasks.filter(t=>t.status!=='completed'&&taskStatus(t)==='deadline').length;
  const activeOther=visibleTasks.filter(t=>t.status!=='completed'&&taskStatus(t)==='normal').length;

  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-7);
  const cutoffStr=cutoff.toISOString().split('T')[0];
  const recentNotes=Object.values(notes).filter(n=>(n.dateKey||'')>=cutoffStr).length;

  return(
    <div className="app">
      <div className="hdr">
        <span className="ht">1887</span>
        <div className="hdr-right">
          <span className="role-badge" style={{color:user.color,borderColor:user.color+'44'}}>{user.icon} {user.name}</span>
          <button className="exit-btn" onClick={()=>{setUser(null);setPinFor(null)}}>Exit</button>
        </div>
      </div>
      <div className="tabs">
        <div className={`tab${tab==='tasks'?' active':''}`} onClick={()=>setTab('tasks')}>
          Tasks
          {urgentCount>0&&<span style={{background:'#E05555',color:'#fff',borderRadius:'10px',padding:'1px 7px',fontSize:'12px',marginLeft:'4px'}}>{urgentCount}</span>}
          {deadlineCount>0&&<span style={{background:'#C4A020',color:'#1A1E16',borderRadius:'10px',padding:'1px 7px',fontSize:'12px',marginLeft:'4px'}}>{deadlineCount}</span>}
          {activeOther>0&&<span style={{background:'#C4A96B',color:'#1A1E16',borderRadius:'10px',padding:'1px 7px',fontSize:'12px',marginLeft:'4px'}}>{activeOther}</span>}
        </div>
        <div className={`tab${tab==='notes'?' active':''}`} onClick={()=>setTab('notes')}>
          Shift Notes
          {recentNotes>0&&<span style={{background:'#8FAF8A',color:'#1A1E16',borderRadius:'10px',padding:'1px 7px',fontSize:'12px',marginLeft:'4px'}}>{recentNotes}</span>}
        </div>
      </div>
      {tab==='tasks'
        ?<TasksTab user={user} tasks={tasks}/>
        :<NotesTab user={user} notes={notes}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
